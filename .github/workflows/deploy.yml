name: Deploy Joe's Learning App

# "Set up deployment and CI/CD" step of the prototype -> production journey:
# on every push to main, install deps, run a quick smoke check, then deploy
# the app to the Azure Web App provisioned by infra/main.bicep.
#
# Required repo configuration (see docs/DEPLOYMENT.md):
#   - Federated (OIDC) credential on an Azure AD app / user-assigned identity
#     with Contributor on the target resource group.
#   - Repo variables: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#     AZURE_WEBAPP_NAME (output of the bicep deployment as `webAppName`).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Smoke test (server boots and responds)
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Server is healthy"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy in time"
          kill $SERVER_PID || true
          exit 1

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: .
